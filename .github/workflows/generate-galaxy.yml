name: Generate Galaxy SVG

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate galaxy SVG
        uses: ./
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/galaxy.svg
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin output >/dev/null 2>&1; then
            git worktree add /tmp/output output
          else
            git worktree add --orphan -b output /tmp/output
          fi
          cp dist/galaxy.svg /tmp/output/galaxy.svg
          cd /tmp/output
          git add galaxy.svg
          git diff --staged --quiet || git commit -m "chore: update galaxy.svg [skip ci]"
          git push origin output
