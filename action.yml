name: 'pac0 – Pac-Man Contribution Animation'
description: "Generates an animated Pac-Man SVG from a GitHub user's contribution graph"
author: 'harsh-sandhu'

branding:
  icon: 'activity'
  color: 'yellow'

inputs:
  username:
    description: 'GitHub username to generate the animation for'
    required: true
  output:
    description: 'Output file path, relative to the repository root'
    required: false
    default: 'dist/pac0.svg'
  github_token:
    description: 'GitHub token for fetching contribution data'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install

    - name: Generate SVG
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        ACTION_PATH: ${{ github.action_path }}
        WORKSPACE: ${{ github.workspace }}
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail
        abs_output="${WORKSPACE}/${INPUT_OUTPUT}"
        mkdir -p "$(dirname "$abs_output")"
        echo "Generating: $abs_output"
        bun run "${ACTION_PATH}/scripts/generate.ts" --username "$INPUT_USERNAME" --output "$abs_output"
